<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Smart Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            display: ['DM Serif Display', 'serif'],
          },
          colors: {
            navy: {
              DEFAULT: '#0f2460',
              mid: '#1a3a8f',
              light: '#2d57c8',
            },
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans bg-[#f5f5f7] text-gray-900 min-h-screen overflow-x-hidden antialiased pb-32">

  <!-- === SIDE DRAWER OVERLAY === -->
  <div class="drawer-overlay fixed inset-0 bg-black/25 z-[400] hidden opacity-0 transition-opacity duration-200" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- === SIDE DRAWER MENU === -->
  <div class="drawer fixed top-0 left-0 bottom-0 w-72 bg-white border-r border-gray-200 z-[500] flex flex-col pt-14 pb-7 shadow-2xl" id="drawer">
    <div class="drawer-header px-5 pb-5 border-b border-gray-200">
      <div class="flex items-center gap-3">
        <img id="drawer-avatar" src="IMG_0162.jpeg" class="w-12 h-12 rounded-full object-cover border-2 border-navy-light" alt="avatar">
        <div>
          <div class="font-display text-xl text-gray-900 leading-tight" id="drawer-name">Suhani</div>
          <div class="text-[0.7rem] font-semibold tracking-widest uppercase text-gray-400 mt-0.5">Smart Attendance</div>
        </div>
      </div>
    </div>

    <nav class="px-3 py-3 flex flex-col gap-1">
      <button class="drawer-nav-item active flex items-center gap-3 px-3.5 py-3 rounded-lg bg-transparent text-gray-600 text-base font-semibold cursor-pointer transition-all text-left" id="nav-schedule" onclick="switchTab('schedule')" type="button">
        <span class="text-lg w-6 text-center">📅</span>
        <span>Schedule</span>
      </button>
      <button class="drawer-nav-item flex items-center gap-3 px-3.5 py-3 rounded-lg bg-transparent text-gray-600 text-base font-semibold cursor-pointer transition-all text-left" id="nav-attendance" onclick="switchTab('attendance')" type="button">
        <span class="text-lg w-6 text-center">📊</span>
        <span>Attendance</span>
      </button>
      <button class="drawer-nav-item flex items-center gap-3 px-3.5 py-3 rounded-lg bg-transparent text-gray-600 text-base font-semibold cursor-pointer transition-all text-left" id="nav-timeline" onclick="switchTab('timeline')" type="button">
        <span class="text-lg w-6 text-center">🗓️</span>
        <span>Academic Timeline</span>
      </button>
    </nav>

    <div class="h-px bg-gray-200 mx-5 my-2"></div>

    <div class="text-[0.7rem] font-bold tracking-widest uppercase text-gray-400 px-5 pb-2">Switch Profile</div>
    <div class="px-3 flex flex-col gap-0.5">
      <button class="drawer-profile-btn active flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg bg-transparent text-gray-600 text-sm font-semibold cursor-pointer transition-all w-full" id="dBtn-suhani" onclick="switchProfile('suhani', this)" type="button">
        <img src="IMG_0162.jpeg" class="drawer-profile-thumb w-8 h-8 rounded-full object-cover border-2 border-gray-200" alt="Suhani">
        <span>Suhani</span>
        <span class="ml-auto text-sm text-navy" id="dCheck-suhani">✓</span>
      </button>
      <button class="drawer-profile-btn flex items-center gap-2.5 px-3.5 py-2.5 rounded-lg bg-transparent text-gray-600 text-sm font-semibold cursor-pointer transition-all w-full" id="dBtn-laksh" onclick="switchProfile('laksh', this)" type="button">
        <img src="IMG_0163.jpeg" class="drawer-profile-thumb w-8 h-8 rounded-full object-cover border-2 border-gray-200" alt="Laksh">
        <span>Laksh</span>
        <span class="ml-auto text-sm text-navy" id="dCheck-laksh" style="display:none">✓</span>
      </button>
    </div>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-[100] bg-[#f5f5f7]/90 backdrop-blur-xl border-b border-gray-200 px-4 pt-3.5 pb-3">
    <div class="flex items-center gap-3 max-w-[600px] mx-auto">
      <button class="hamburger-btn flex flex-col gap-[5px] p-2 bg-transparent border-0 cursor-pointer rounded-lg transition-colors hover:bg-gray-200" onclick="openDrawer()" aria-label="Menu" type="button">
        <span class="block w-[22px] h-0.5 bg-gray-900 rounded-sm"></span>
        <span class="block w-[22px] h-0.5 bg-gray-900 rounded-sm"></span>
        <span class="block w-[22px] h-0.5 bg-gray-900 rounded-sm"></span>
      </button>
      <div class="flex-1 min-w-0">
        <p class="text-[0.72rem] font-bold uppercase tracking-widest text-navy-light mb-0.5" id="header-tab-label">Schedule</p>
        <h1 class="font-display text-2xl text-gray-900 leading-tight whitespace-nowrap overflow-hidden text-ellipsis" id="header-title">Suhani's Timetable</h1>
      </div>
      <div class="flex-shrink-0">
        <img id="header-avatar" src="IMG_0162.jpeg" alt="avatar" class="w-10 h-10 rounded-full object-cover border-2 border-gray-300">
      </div>
    </div>
  </header>

  <!-- ========== SCHEDULE TAB ========== -->
  <div id="tab-schedule" class="tab-page active">

    <!-- Who's Busy Now -->
    <div class="busy-section max-w-[600px] mx-auto mt-4 mx-4 p-5 bg-white rounded-2xl border border-gray-200 shadow-sm" id="busySection" style="margin-left:auto;margin-right:auto;">
      <div class="text-center text-[0.72rem] font-bold tracking-widest uppercase text-gray-400 mb-3">Who's busy right now?</div>
      <div class="flex items-center justify-center gap-6 mb-1">
        <div class="flex flex-col items-center gap-1.5" id="busySuhani">
          <span class="text-sm font-bold text-gray-700">Suhani</span>
          <span class="text-sm font-semibold text-gray-900" id="indicatorSuhani">🟢 Free</span>
        </div>
        <div class="text-gray-300 text-2xl font-light">·</div>
        <div class="flex flex-col items-center gap-1.5" id="busyLaksh">
          <span class="text-sm font-bold text-gray-700">Laksh</span>
          <span class="text-sm font-semibold text-gray-900" id="indicatorLaksh">🟢 Free</span>
        </div>
      </div>
      <div class="text-center text-sm font-semibold text-gray-600 mt-3" id="busySummary"></div>
      <div class="hidden items-center justify-center gap-1.5 mt-3 pt-3 border-t border-gray-200 text-sm font-semibold text-gray-600" id="freeTimeRow">
        <span class="text-base">🤝</span>
        <span id="freeTimeText">Calculating...</span>
      </div>
    </div>

    <!-- Date Strip -->
    <div class="max-w-[600px] mx-auto px-4 pt-4">
      <div class="date-strip-header">
        <div class="date-strip-title" id="dateStripTitle">This Week</div>
        <button class="date-cal-btn" onclick="openCalendar()" aria-label="Open calendar" type="button">📅 Calendar</button>
      </div>
      <div class="tabs date-tabs flex gap-1.5 overflow-x-auto pb-1" id="tabs"></div>
    </div>

    <!-- Schedule -->
    <main class="max-w-[600px] mx-auto px-4 pb-5">
      <div id="scheduleWrapper" class="schedule-wrapper overflow-hidden">
        <div id="schedule" class="pt-3"></div>
      </div>
    </main>

    <!-- Floating Add Button -->
    <button class="fab-add" id="fabAdd" onclick="openAddModal()" aria-label="Add lecture" type="button">＋</button>

  </div>

  <!-- ========== ATTENDANCE TAB ========== -->
  <div id="tab-attendance" class="tab-page">
    <div class="max-w-[600px] mx-auto px-4 py-4">
      <div id="attendanceCards" class="space-y-3"></div>
    </div>
  </div>

  <!-- ========== SUBJECT DETAIL PAGE ========== -->
  <div id="tab-subject-detail" class="tab-page">
    <div class="max-w-[600px] mx-auto px-4 pt-4 pb-16" id="subjectDetailContent"></div>
  </div>

  <!-- ========== ACADEMIC TIMELINE TAB ========== -->
  <div id="tab-timeline" class="tab-page">
    <div class="max-w-[600px] mx-auto px-4 pt-4 pb-16">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-display text-xl text-navy">Academic Timeline</h2>
      </div>
      <div id="timelineCards"></div>
    </div>
  </div>

  <!-- Bottom Popup -->
  <div id="nextClassPopup" class="popup fixed bottom-5 left-1/2 -translate-x-1/2 z-[200] bg-navy text-white rounded-full px-5 py-2.5 shadow-lg pointer-events-none">
    <div class="flex items-center gap-2">
      <span class="popup-icon text-base">⏳</span>
      <span class="popup-text text-sm font-bold whitespace-nowrap">Calculating...</span>
    </div>
  </div>

  <!-- ===== EDIT / ADD MODAL ===== -->
  <div id="editModal" class="modal-overlay" onclick="handleModalOverlayClick(event)" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Class Details</span>
        <button class="modal-close" onclick="closeModal()" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label for="editTag">Type</label>
          <select id="editTag" name="editTag" onchange="onTagChange()" disabled>
            <option value="DSC">DSC</option>
            <option value="SEC">SEC</option>
            <option value="VAC">VAC</option>
            <option value="AEC">AEC</option>
            <option value="GE">GE</option>
            <option value="TUTORIAL">Tutorial</option>
            <option value="PRACTICAL">Practical</option>
            <option value="BREAK">Break / Gap</option>
          </select>
        </div>
        <div class="modal-field">
          <label for="edit-subject">Subject</label>
          <input type="text" id="edit-subject" name="edit-subject" placeholder="Subject name" readonly autocomplete="off">
        </div>
        <div class="modal-field modal-time-row">
          <div class="modal-field-half">
            <label for="edit-start">Start <span class="hint">(HH:MM)</span></label>
            <input type="text" id="edit-start" name="edit-start" placeholder="10:45" readonly inputmode="text" autocomplete="off">
          </div>
          <div class="modal-field-half">
            <label for="edit-end">End <span class="hint">(HH:MM)</span></label>
            <input type="text" id="edit-end" name="edit-end" placeholder="11:45" readonly inputmode="text" autocomplete="off">
          </div>
        </div>
        <div class="modal-field">
          <label for="edit-room">Room</label>
          <input type="text" id="edit-room" name="edit-room" placeholder="Room / location" readonly autocomplete="off">
        </div>
        <div class="modal-field">
          <label for="edit-teacher">Teacher</label>
          <input type="text" id="edit-teacher" name="edit-teacher" placeholder="Teacher name" readonly autocomplete="off">
        </div>
      </div>

      <div class="modal-footer" id="modalFooter">
        <button class="modal-btn edit-btn" id="editToggleBtn" onclick="toggleEdit()" type="button">✏️ Edit</button>
        <button class="modal-btn save-btn" id="saveBtn" onclick="saveEdit()" style="display:none" type="button">💾 Save</button>
        <button class="modal-btn cancel-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none" type="button">Cancel</button>
        <button class="modal-btn delete-btn" id="deleteBtn" onclick="deleteLecture()" style="display:none" type="button">🗑️</button>
      </div>
      <div class="modal-hint" id="modalHint"></div>
    </div>
  </div>

  <!-- ===== CALENDAR MODAL ===== -->
  <div id="calendarModal" class="modal-overlay" onclick="handleCalendarOverlayClick(event)" role="dialog" aria-modal="true" aria-labelledby="calTitle">
    <div class="modal-box calendar-box">
      <div class="modal-handle"></div>
      <div class="cal-header">
        <button class="cal-nav" onclick="calNavMonth(-1)" aria-label="Previous month" type="button">‹</button>
        <div class="cal-title" id="calTitle">Month Year</div>
        <button class="cal-nav" onclick="calNavMonth(1)" aria-label="Next month" type="button">›</button>
      </div>
      <div class="cal-weekdays">
        <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-footer">
        <button class="cal-today-btn" onclick="calJumpToToday()" type="button">Jump to Today</button>
      </div>
    </div>
  </div>

  <!-- ===== ACADEMIC PERIOD MODAL ===== -->
  <div id="periodModal" class="modal-overlay" onclick="handlePeriodModalOverlayClick(event)" role="dialog" aria-modal="true" aria-labelledby="pmTitle">
    <div class="modal-box">
      <div class="modal-handle"></div>
      <div class="modal-header">
        <span class="modal-title" id="pmTitle">Add Academic Period</span>
        <button class="modal-close" onclick="closePeriodModal()" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label for="pmName">Period Name</label>
          <input type="text" id="pmName" name="pmName" placeholder="e.g. Semester 5" autocomplete="off">
        </div>
        <div class="modal-field">
          <label for="pmType">Period Type</label>
          <select id="pmType" name="pmType">
            <option value="Semester">🎓 Semester</option>
            <option value="Vacation">🏖 Vacation</option>
            <option value="Preparatory Leave">📖 Preparatory Leave</option>
            <option value="Exam Period">📝 Exam Period</option>
            <option value="Custom">📅 Custom</option>
          </select>
        </div>
        <div class="modal-field modal-time-row">
          <div class="modal-field-half">
            <label for="pmStart">Start Date</label>
            <input type="date" id="pmStart" name="pmStart">
          </div>
          <div class="modal-field-half">
            <label for="pmEnd">End Date</label>
            <input type="date" id="pmEnd" name="pmEnd">
          </div>
        </div>
        <div class="modal-field" id="pmDupContainer">
          <label for="pmDuplicate">Duplicate Timetable From</label>
          <select id="pmDuplicate" name="pmDuplicate">
            <option value="">-- Blank Timetable --</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-btn save-btn" onclick="savePeriod()" type="button">💾 Save</button>
        <button class="modal-btn cancel-btn" onclick="closePeriodModal()" type="button">Cancel</button>
      </div>
      <div class="modal-hint" id="pmHint"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>

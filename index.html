<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Smart Attendance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-suhani">

  <!-- Background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <!-- === NEW: SIDE DRAWER OVERLAY === -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- === NEW: SIDE DRAWER MENU === -->
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-profile-row">
        <img id="drawer-avatar" src="https://i.pinimg.com/564x/02/a9/55/02a9551d5605cfb4a3f2ae976905f09e.jpg" class="drawer-avatar" alt="avatar">
        <div>
          <div class="drawer-name" id="drawer-name">Suhani</div>
          <div class="drawer-sub">Smart Attendance</div>
        </div>
      </div>
    </div>

    <nav class="drawer-nav">
      <button class="drawer-nav-item active" id="nav-schedule" onclick="switchTab('schedule')">
        <span class="drawer-nav-icon">📅</span>
        <span>Schedule</span>
      </button>
      <button class="drawer-nav-item" id="nav-attendance" onclick="switchTab('attendance')">
        <span class="drawer-nav-icon">📊</span>
        <span>Attendance</span>
      </button>
    </nav>

    <div class="drawer-divider"></div>

    <div class="drawer-section-label">Switch Profile</div>
    <div class="drawer-profile-switcher">
      <button class="drawer-profile-btn active" id="dBtn-suhani" onclick="switchProfile('suhani', this)">
        <img src="https://i.pinimg.com/564x/02/a9/55/02a9551d5605cfb4a3f2ae976905f09e.jpg" class="drawer-profile-thumb" alt="Suhani">
        <span>Suhani</span>
        <span class="drawer-check" id="dCheck-suhani">✓</span>
      </button>
      <button class="drawer-profile-btn" id="dBtn-laksh" onclick="switchProfile('laksh', this)">
        <img src="https://i.pinimg.com/originals/f4/2a/f1/f42af16ba580f84430d39a5838ad0c70.jpg" class="drawer-profile-thumb" alt="Laksh">
        <span>Laksh</span>
        <span class="drawer-check" id="dCheck-laksh" style="display:none">✓</span>
      </button>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <!-- NEW: Hamburger button -->
      <button class="hamburger-btn" onclick="openDrawer()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="header-text">
        <p class="header-sub" id="header-tab-label">Schedule</p>
        <h1 class="header-title" id="header-title">Suhani's<br>Timetable</h1>
      </div>
      <div class="header-avatar-wrap">
        <img id="header-avatar" src="https://i.pinimg.com/564x/02/a9/55/02a9551d5605cfb4a3f2ae976905f09e.jpg" alt="avatar" class="shinchan-wave">
      </div>
    </div>
  </header>

  <!-- ========== SCHEDULE TAB ========== -->
  <div id="tab-schedule" class="tab-page active">

    <!-- Who's Busy Now -->
    <div class="busy-section" id="busySection">
      <div class="busy-header">Who's busy right now?</div>
      <div class="busy-status-row">
        <div class="busy-person" id="busySuhani">
          <span class="busy-name">Suhani</span>
          <span class="busy-indicator" id="indicatorSuhani">🟢 Free</span>
        </div>
        <div class="busy-divider">·</div>
        <div class="busy-person" id="busyLaksh">
          <span class="busy-name">Laksh</span>
          <span class="busy-indicator" id="indicatorLaksh">🟢 Free</span>
        </div>
      </div>
      <div class="busy-summary" id="busySummary"></div>
      <div class="free-time-row" id="freeTimeRow">
        <span class="free-time-icon">🤝</span>
        <span class="free-time-text" id="freeTimeText">Calculating...</span>
      </div>
    </div>

    <!-- Day Tabs -->
    <div class="tabs-wrapper">
      <div class="tabs" id="tabs">
        <button onclick="showDay('mon', this)" data-day="mon">Mon</button>
        <button onclick="showDay('tue', this)" data-day="tue">Tue</button>
        <button onclick="showDay('wed', this)" data-day="wed">Wed</button>
        <button onclick="showDay('thu', this)" data-day="thu">Thu</button>
        <button onclick="showDay('fri', this)" data-day="fri">Fri</button>
        <button onclick="showDay('sat', this)" data-day="sat">Sat</button>
      </div>
    </div>

    <!-- Schedule -->
    <main>
      <div id="scheduleWrapper" class="schedule-wrapper">
        <div id="schedule"></div>
      </div>
    </main>

  </div>

  <!-- ========== ATTENDANCE TAB ========== -->
  <div id="tab-attendance" class="tab-page">

    <div class="attendance-page">

      <!-- End-Semester Mode -->
      <div class="end-sem-card">
        <div class="end-sem-label">📆 End-Semester Simulator</div>
        <div class="end-sem-row">
          <input type="number" id="remainingClasses" placeholder="Remaining classes" min="0" max="100"
            oninput="renderAttendance()">
          <button class="end-sem-btn" onclick="document.getElementById('remainingClasses').value=''; renderAttendance()">Reset</button>
        </div>
      </div>

      <!-- Attendance Cards -->
      <div id="attendanceCards"></div>

    </div>

  </div>

  <!-- Bottom Popup (only on schedule tab) -->
  <div id="nextClassPopup" class="popup">
    <div class="popup-inner">
      <span class="popup-icon">⏳</span>
      <span class="popup-text">Calculating...</span>
    </div>
  </div>

  <!-- ===== EDIT MODAL ===== -->
  <div id="editModal" class="modal-overlay" onclick="handleModalOverlayClick(event)">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Class Details</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label>Type</label>
          <select id="editTag" onchange="onTagChange()" disabled>
            <option value="lecture">Lecture</option>
            <option value="tutorial">Tutorial</option>
            <option value="break">Break</option>
          </select>
        </div>
        <div class="modal-field">
          <label>Subject</label>
          <input type="text" id="edit-subject" placeholder="Subject name" readonly>
        </div>
        <div class="modal-field">
          <label>Start Time <span class="hint">(HH:MM)</span></label>
          <input type="text" id="edit-start" placeholder="e.g. 10:45" readonly>
        </div>
        <div class="modal-field">
          <label>End Time <span class="hint">(HH:MM)</span></label>
          <input type="text" id="edit-end" placeholder="e.g. 11:45" readonly>
        </div>
        <div class="modal-field">
          <label>Room</label>
          <input type="text" id="edit-room" placeholder="Room / location" readonly>
        </div>
        <div class="modal-field">
          <label>Teacher</label>
          <input type="text" id="edit-teacher" placeholder="Teacher name" readonly>
        </div>
      </div>

      <!-- NEW: Attendance Status Buttons -->
      <div class="modal-attendance-row" id="modalAttendanceRow">
        <div class="modal-att-label">Mark Attendance</div>
        <div class="modal-att-btns">
          <button class="att-btn att-attended" id="attBtn-attended" onclick="markAttendance('attended')">✅ Attended</button>
          <button class="att-btn att-missed"   id="attBtn-missed"   onclick="markAttendance('missed')">❌ Missed</button>
          <button class="att-btn att-cancelled" id="attBtn-cancelled" onclick="markAttendance('cancelled')">🚫 Cancelled</button>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-btn edit-btn" id="editToggleBtn" onclick="toggleEdit()">✏️ Edit</button>
        <button class="modal-btn save-btn" id="saveBtn" onclick="saveEdit()" style="display:none">💾 Save</button>
        <button class="modal-btn cancel-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancel</button>
      </div>
      <div class="modal-hint" id="modalHint"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
